<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 900" role="img" aria-labelledby="title desc">
  <title id="title">Top down wrestling ring reference</title>
  <desc id="desc">Clean overhead wrestling ring reference for Phaser wrestling prototype scale and staging.</desc>
  <defs>
    <style>
      .ink{stroke:#071018;stroke-width:5;stroke-linecap:round;stroke-linejoin:round;fill:none}
      .rope{stroke:#9ca3ad;stroke-width:4;stroke-linecap:round;fill:none}
      .mat{fill:#f8fbff;stroke:#d9e0e8;stroke-width:3}
      .postDark{fill:#cc2424;stroke:#071018;stroke-width:4}
      .postLight{fill:#e5e7eb;stroke:#071018;stroke-width:4}
      .postBlue{fill:#1367d8;stroke:#071018;stroke-width:4}
      .turn{fill:#f1f5f9;stroke:#071018;stroke-width:3}
      .label{font:700 24px Arial,sans-serif;fill:#071018;text-anchor:middle}
    </style>
  </defs>

  <text x="450" y="55" class="label">TOP DOWN RING, CLEAN OVERHEAD SCALE REFERENCE</text>
  <rect x="190" y="190" width="520" height="520" class="mat"/>

  <g id="ropes">
    <rect x="170" y="170" width="560" height="560" class="ink"/>
    <rect x="182" y="182" width="536" height="536" class="rope"/>
    <rect x="194" y="194" width="512" height="512" class="rope"/>
    <rect x="206" y="206" width="488" height="488" class="rope"/>
  </g>

  <g id="corners">
    <circle cx="170" cy="170" r="25" class="postDark"/>
    <circle cx="730" cy="170" r="25" class="postLight"/>
    <circle cx="170" cy="730" r="25" class="postLight"/>
    <circle cx="730" cy="730" r="25" class="postBlue"/>

    <rect x="184" y="145" width="70" height="34" rx="12" class="postDark" transform="rotate(-45 184 145)"/>
    <rect x="646" y="145" width="70" height="34" rx="12" class="postLight" transform="rotate(45 646 145)"/>
    <rect x="184" y="721" width="70" height="34" rx="12" class="postLight" transform="rotate(45 184 721)"/>
    <rect x="646" y="721" width="70" height="34" rx="12" class="postBlue" transform="rotate(-45 646 721)"/>

    <rect x="190" y="190" width="46" height="46" rx="8" class="turn"/>
    <rect x="664" y="190" width="46" height="46" rx="8" class="turn"/>
    <rect x="190" y="664" width="46" height="46" rx="8" class="turn"/>
    <rect x="664" y="664" width="46" height="46" rx="8" class="turn"/>
  </g>

  <g id="gameplay_guides" opacity="0.38">
    <line x1="450" y1="190" x2="450" y2="710" class="rope"/>
    <line x1="190" y1="450" x2="710" y2="450" class="rope"/>
    <circle cx="450" cy="450" r="120" class="rope"/>
  </g>
</svg>
