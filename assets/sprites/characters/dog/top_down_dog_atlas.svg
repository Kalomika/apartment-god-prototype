<svg xmlns="http://www.w3.org/2000/svg" width="512" height="128" viewBox="0 0 512 128">
  <defs>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="5" stdDeviation="3" flood-color="#071018" flood-opacity="0.28"/>
    </filter>
    <linearGradient id="coat" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f3ead7"/>
      <stop offset="1" stop-color="#c9bda4"/>
    </linearGradient>
    <linearGradient id="ear" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#9d8668"/>
      <stop offset="1" stop-color="#5e4a38"/>
    </linearGradient>
    <linearGradient id="shade" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.42"/>
      <stop offset="1" stop-color="#75664f" stop-opacity="0.28"/>
    </linearGradient>
    <style>
      .outline{stroke:#071018;stroke-width:4;stroke-linecap:round;stroke-linejoin:round}
      .thin{stroke:#071018;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
      .collar{stroke:#44c7df;stroke-width:5;stroke-linecap:round}
      .mark{fill:#7e6b55;opacity:.42}
      .highlight{fill:#fff7e6;opacity:.46}
    </style>
  </defs>

  <!-- south/front -->
  <g transform="translate(64 64)" filter="url(#softShadow)">
    <ellipse cx="0" cy="24" rx="34" ry="13" fill="#071018" opacity=".18"/>
    <path class="outline" d="M-23,2 C-36,28 -34,45 -21,48 C-11,44 -13,20 -8,5" fill="url(#coat)"/>
    <path class="outline" d="M23,2 C36,28 34,45 21,48 C11,44 13,20 8,5" fill="url(#coat)"/>
    <path class="outline" d="M-26,-14 C-41,-35 -42,-51 -29,-56 C-15,-50 -18,-28 -13,-15" fill="url(#coat)"/>
    <path class="outline" d="M26,-14 C41,-35 42,-51 29,-56 C15,-50 18,-28 13,-15" fill="url(#coat)"/>
    <ellipse class="outline" cx="0" cy="-1" rx="32" ry="44" fill="url(#coat)"/>
    <ellipse class="mark" cx="-9" cy="5" rx="18" ry="29"/>
    <path class="collar" d="M-19,-31 C-4,-25 4,-25 19,-31"/>
    <ellipse class="outline" cx="0" cy="-46" rx="26" ry="21" fill="url(#coat)"/>
    <ellipse class="outline" cx="-24" cy="-49" rx="9" ry="20" fill="url(#ear)" transform="rotate(-22 -24 -49)"/>
    <ellipse class="outline" cx="24" cy="-49" rx="9" ry="20" fill="url(#ear)" transform="rotate(22 24 -49)"/>
    <ellipse class="thin" cx="0" cy="-38" rx="12" ry="9" fill="#f7efe0"/>
    <circle cx="-8" cy="-50" r="3" fill="#071018"/><circle cx="8" cy="-50" r="3" fill="#071018"/>
    <circle cx="0" cy="-39" r="4" fill="#071018"/>
    <path class="thin" d="M-44,-2 C-67,-25 -59,-42 -36,-36" fill="none"/>
    <ellipse class="highlight" cx="10" cy="-6" rx="12" ry="28"/>
  </g>

  <!-- north/back -->
  <g transform="translate(192 64)" filter="url(#softShadow)">
    <ellipse cx="0" cy="24" rx="34" ry="13" fill="#071018" opacity=".18"/>
    <path class="outline" d="M-22,4 C-36,29 -33,45 -20,48 C-10,44 -13,20 -8,4" fill="url(#coat)"/>
    <path class="outline" d="M22,4 C36,29 33,45 20,48 C10,44 13,20 8,4" fill="url(#coat)"/>
    <path class="outline" d="M-26,-13 C-43,-31 -44,-47 -30,-54 C-15,-48 -17,-28 -12,-14" fill="url(#coat)"/>
    <path class="outline" d="M26,-13 C43,-31 44,-47 30,-54 C15,-48 17,-28 12,-14" fill="url(#coat)"/>
    <ellipse class="outline" cx="0" cy="0" rx="33" ry="45" fill="url(#coat)"/>
    <ellipse class="mark" cx="8" cy="1" rx="17" ry="30"/>
    <path class="collar" d="M-20,-31 C-5,-26 5,-26 20,-31"/>
    <ellipse class="outline" cx="0" cy="-47" rx="27" ry="21" fill="url(#coat)"/>
    <ellipse class="outline" cx="-25" cy="-51" rx="10" ry="20" fill="url(#ear)" transform="rotate(-18 -25 -51)"/>
    <ellipse class="outline" cx="25" cy="-51" rx="10" ry="20" fill="url(#ear)" transform="rotate(18 25 -51)"/>
    <path class="thin" d="M-13,-42 C-5,-47 5,-47 13,-42" fill="none" opacity=".34"/>
    <path class="thin" d="M-44,-2 C-67,-25 -59,-42 -36,-36" fill="none"/>
    <ellipse class="highlight" cx="-9" cy="-8" rx="10" ry="26"/>
  </g>

  <!-- east/right -->
  <g transform="translate(320 64) rotate(90)" filter="url(#softShadow)">
    <ellipse cx="0" cy="24" rx="34" ry="13" fill="#071018" opacity=".18"/>
    <path class="outline" d="M-23,2 C-36,28 -34,45 -21,48 C-11,44 -13,20 -8,5" fill="url(#coat)"/>
    <path class="outline" d="M23,2 C36,28 34,45 21,48 C11,44 13,20 8,5" fill="url(#coat)"/>
    <path class="outline" d="M-26,-14 C-41,-35 -42,-51 -29,-56 C-15,-50 -18,-28 -13,-15" fill="url(#coat)"/>
    <path class="outline" d="M26,-14 C41,-35 42,-51 29,-56 C15,-50 18,-28 13,-15" fill="url(#coat)"/>
    <ellipse class="outline" cx="0" cy="-1" rx="32" ry="44" fill="url(#coat)"/>
    <ellipse class="mark" cx="-9" cy="5" rx="18" ry="29"/>
    <path class="collar" d="M-19,-31 C-4,-25 4,-25 19,-31"/>
    <ellipse class="outline" cx="0" cy="-46" rx="26" ry="21" fill="url(#coat)"/>
    <ellipse class="outline" cx="-24" cy="-49" rx="9" ry="20" fill="url(#ear)" transform="rotate(-22 -24 -49)"/>
    <ellipse class="outline" cx="24" cy="-49" rx="9" ry="20" fill="url(#ear)" transform="rotate(22 24 -49)"/>
    <ellipse class="thin" cx="0" cy="-38" rx="12" ry="9" fill="#f7efe0"/>
    <circle cx="-8" cy="-50" r="3" fill="#071018"/><circle cx="8" cy="-50" r="3" fill="#071018"/>
    <circle cx="0" cy="-39" r="4" fill="#071018"/>
    <path class="thin" d="M-44,-2 C-67,-25 -59,-42 -36,-36" fill="none"/>
  </g>

  <!-- west/left -->
  <g transform="translate(448 64) rotate(-90)" filter="url(#softShadow)">
    <ellipse cx="0" cy="24" rx="34" ry="13" fill="#071018" opacity=".18"/>
    <path class="outline" d="M-23,2 C-36,28 -34,45 -21,48 C-11,44 -13,20 -8,5" fill="url(#coat)"/>
    <path class="outline" d="M23,2 C36,28 34,45 21,48 C11,44 13,20 8,5" fill="url(#coat)"/>
    <path class="outline" d="M-26,-14 C-41,-35 -42,-51 -29,-56 C-15,-50 -18,-28 -13,-15" fill="url(#coat)"/>
    <path class="outline" d="M26,-14 C41,-35 42,-51 29,-56 C15,-50 18,-28 13,-15" fill="url(#coat)"/>
    <ellipse class="outline" cx="0" cy="-1" rx="32" ry="44" fill="url(#coat)"/>
    <ellipse class="mark" cx="-9" cy="5" rx="18" ry="29"/>
    <path class="collar" d="M-19,-31 C-4,-25 4,-25 19,-31"/>
    <ellipse class="outline" cx="0" cy="-46" rx="26" ry="21" fill="url(#coat)"/>
    <ellipse class="outline" cx="-24" cy="-49" rx="9" ry="20" fill="url(#ear)" transform="rotate(-22 -24 -49)"/>
    <ellipse class="outline" cx="24" cy="-49" rx="9" ry="20" fill="url(#ear)" transform="rotate(22 24 -49)"/>
    <ellipse class="thin" cx="0" cy="-38" rx="12" ry="9" fill="#f7efe0"/>
    <circle cx="-8" cy="-50" r="3" fill="#071018"/><circle cx="8" cy="-50" r="3" fill="#071018"/>
    <circle cx="0" cy="-39" r="4" fill="#071018"/>
    <path class="thin" d="M-44,-2 C-67,-25 -59,-42 -36,-36" fill="none"/>
  </g>
</svg>
