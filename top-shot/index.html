<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Top Shot v0.1</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="shell">
    <section class="stage">
      <canvas id="game" width="1280" height="720" aria-label="Top Shot AI arena"></canvas>
      <div id="overlay" class="overlay"></div>
    </section>
    <aside class="panel">
      <h1>Top Shot</h1>
      <p class="tagline">AI versus AI arena pet battler, v0.1.</p>
      <label>Fighter A
        <select id="fighterA"></select>
      </label>
      <label>Fighter B
        <select id="fighterB"></select>
      </label>
      <div class="row">
        <button id="startMatch">Start Match</button>
        <button id="pauseMatch">Pause</button>
      </div>
      <div class="row">
        <button data-drop="med">Drop Med</button>
        <button data-drop="ammo">Drop Ammo</button>
        <button data-drop="weapon">Drop Weapon</button>
      </div>
      <p id="dropHint" class="hint">Coach drops help Fighter A. Click a drop, then click the arena.</p>
      <section id="hud"></section>
      <ol id="log" class="log"></ol>
    </aside>
  </main>
  <script type="module" src="src/main.js"></script>
</body>
</html>
