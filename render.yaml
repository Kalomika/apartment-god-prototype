services:
  - type: web
    name: grapple-gods-phaser
    runtime: static
    rootDir: wrestling_sim/web_phaser
    repo: https://github.com/Kalomika/apartment-god-prototype
    branch: wrestling-sim-foundation
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
