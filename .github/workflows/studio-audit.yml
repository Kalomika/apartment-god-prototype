name: Studio Governance Audit

on:
  pull_request:
    paths:
      - "studio/**"
      - "tools/studio_audit.py"
      - "AGENTS.md"
      - "docs/APARTMENT_GOD_*.md"
      - "apartment-god-production/**"
  push:
    branches:
      - phaser-migration
    paths:
      - "studio/**"
      - "tools/studio_audit.py"
      - "AGENTS.md"
      - "docs/APARTMENT_GOD_*.md"
      - "apartment-god-production/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run studio audit
        run: python tools/studio_audit.py
