name: Top Shot Checks

on:
  workflow_dispatch:

jobs:
  top-shot:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: top-shot
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: top-shot/package-lock.json

      - name: Install
        run: npm install

      - name: Syntax check
        run: npm run check

      - name: Smoke simulation
        run: npm run smoke

      - name: Build
        run: npm run build
