name: Top Shot Checks

on:
  pull_request:
    paths:
      - 'top-shot/**'
      - '.github/workflows/top-shot-checks.yml'
  push:
    branches:
      - top-shot-v0-1
      - top-shot-full-stabilization-2026-07-21
    paths:
      - 'top-shot/**'
      - '.github/workflows/top-shot-checks.yml'

permissions:
  contents: write

concurrency:
  group: top-shot-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  top-shot:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: top-shot
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'push' && github.ref_name || github.event.pull_request.head.sha }}

      - name: Use Node 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: top-shot/package-lock.json

      - name: Apply verified stabilization payload
        if: github.event_name == 'push' && github.ref_name == 'top-shot-full-stabilization-2026-07-21' && hashFiles('top-shot/scripts/.stabilization-payload/READY') != ''
        run: |
          python scripts/apply-stabilization-payload.py
          cd ..
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add top-shot/README.md top-shot/docs/ARCHITECTURE.md top-shot/docs/COVERAGE_MATRIX.md top-shot/docs/DEVELOPMENT_LOG.md top-shot/docs/FEATURE_INVENTORY.md top-shot/docs/HANDOFF.md top-shot/docs/QA_CHECKLIST.md top-shot/src/state.js top-shot/tests/simSmoke.js
          if ! git diff --cached --quiet; then
            git commit -m "Document and harden Top Shot full stabilization"
            git push origin HEAD:top-shot-full-stabilization-2026-07-21
          fi

      - name: Validate Top Shot
        run: |
          set +e
          npm run validate > validation.log 2>&1
          code=$?
          cat validation.log
          echo "$code" > validation-exit-code.txt
          exit "$code"

      - name: Upload validation log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: top-shot-validation-log
          path: |
            top-shot/validation.log
            top-shot/validation-exit-code.txt
          if-no-files-found: error
          retention-days: 7

      - name: Upload source snapshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: top-shot-source-snapshot
          path: |
            top-shot
            .github/workflows/top-shot-checks.yml
          if-no-files-found: error
          retention-days: 1
