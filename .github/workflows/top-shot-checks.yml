name: Top Shot Checks

on:
  pull_request:
    paths:
      - 'top-shot/**'
      - '.github/workflows/top-shot-checks.yml'
  push:
    branches:
      - top-shot-v0-1
      - top-shot-full-stabilization-2026-07-21
    paths:
      - 'top-shot/**'
      - '.github/workflows/top-shot-checks.yml'

concurrency:
  group: top-shot-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  top-shot:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: top-shot
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: top-shot/package-lock.json

      - name: Validate Top Shot
        run: npm run validate
