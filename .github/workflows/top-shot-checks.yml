name: Top Shot Checks

on:
  pull_request:
    paths:
      - 'top-shot/**'
      - '.github/workflows/top-shot-checks.yml'
  push:
    branches:
      - top-shot-v0-1
      - top-shot-full-stabilization-2026-07-21
    paths:
      - 'top-shot/**'
      - '.github/workflows/top-shot-checks.yml'

concurrency:
  group: top-shot-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  top-shot:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: top-shot
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: top-shot/package-lock.json

      - name: Install
        run: npm ci

      - name: Syntax check
        run: npm run check

      - name: Asset integrity
        run: npm run assets:check

      - name: Starshot smoke
        run: npm run starshot-smoke

      - name: Simulation smoke
        run: npm run smoke:sim

      - name: CQC smoke
        run: npm run smoke:cqc

      - name: Stealth smoke
        run: npm run smoke:stealth

      - name: Model smoke
        run: npm run smoke:model

      - name: Full smoke gate
        run: npm run smoke

      - name: Build
        run: npm run build
