name: P2 Reference Quality Visual Overhaul Pass 01

on:
  push:
    branches:
      - phaser-migration-2
    paths:
      - '.github/workflows/p2-reference-quality-visual-overhaul-pass-01.yml'

permissions:
  contents: write

jobs:
  build-reference-visual-pass:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 25
