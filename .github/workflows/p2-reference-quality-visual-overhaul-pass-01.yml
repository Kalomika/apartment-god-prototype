            <filter id="shadow"><feDropShadow dx="0" dy="4" stdDeviation="3" flood-color="#05080d" flood-opacity=".55"/></filter>
          </defs>`;
          
          function objectSvg(title, body, extra='') {
            return `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128"><title>${title}</title>${defs}${extra}<g filter="url(#shadow)">${body}</g></svg>`;
