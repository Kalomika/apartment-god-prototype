name: P2 Mobile Gameplay Parity Repair

on:
  push:
    branches:
      - phaser-migration-2
    paths:
      - '.github/workflows/p2-mobile-gameplay-parity-repair.yml'

permissions:
  contents: write

jobs:
  repair-mobile-gameplay-parity:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout latest Phaser Migration 2
        uses: actions/checkout@v4
        with:
          ref: phaser-migration-2
          fetch-depth: 0
          persist-credentials: true

      - name: Verify repository, branch, backup and standing rules
        run: |
          test "$GITHUB_REPOSITORY" = "Kalomika/apartment-god-prototype"
          test "$(git branch --show-current)" = "phaser-migration-2"
          git ls-remote --exit-code --heads origin backup/phaser-migration-2-before-mobile-gameplay-parity-repair-2026-07-19
          test -f docs/APARTMENT_GOD_DEVELOPMENT_HANDBOOK.md
          test -f docs/APARTMENT_GOD_BACKUP_POLICY.md
          test -f docs/APARTMENT_GOD_NO_BROAD_IMPLEMENTATION_RULE.md
          test -f docs/APARTMENT_GOD_PNG_UPLOAD_FALLBACK.md
          test -f apartment-god-production/ONGOING_DESIGN_LOG.md
          test -f apartment-god-production/DEVELOPMENT_MATRIX.md
          test -f apartment-god-production/ONGOING_DESIGN_LOG_APPEND_2026-07-19_MOBILE_GAMEPLAY_PARITY_REPAIR_START.md
          test -f apartment-god-production/APARTMENT_GOD_IDEA_BIBLE_APPEND_2026-07-19_MOBILE_GAMEPLAY_PARITY_REPAIR.md
          git log -10 --oneline

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install project
        run: npm install --no-package-lock

      - name: Apply source repair
        run: node scripts/p2-mobile-gameplay-parity-repair.mjs

      - name: Verify gameplay parity source
        run: |
          grep -q "syncPhoneUi(scene.state)" src/phaserMigration2Runtime.js
          grep -q "syncCameraNavigationUi(scene.state)" src/phaserMigration2Runtime.js
          grep -q "syncNativeDomGameplayUi(this)" src/phaserMigration2Runtime.js
          grep -q "hud-resource-strip" index.html
          grep -q "utility-state" index.html
          grep -q 'id="floor-5"' index.html
          grep -q "Math.floor(width \* 3 / 4)" src/fit.js
          ! grep -q "0 0 50vh" src/fit.js
          grep -q "panel.setCrop(6, 6, 116, 116)" src/phaserMigration2Runtime.js
          grep -q "applyObjectVisualTransform" src/phaserMigration2VisualCatalog.js
          grep -q "const underlay = scene.add.graphics().setDepth(-5)" src/phaserMigration2ReferenceCompletion.js
          ! grep -q "scene.roomLayer?.add?.(architecture)" src/phaserMigration2ReferenceCompletion.js
          ! grep -q "drawPhaserEnvironment" src/phaserMigration2Runtime.js
          ! grep -q "textures.addCanvas" src/phaserMigration2Runtime.js

      - name: Repository checks
        run: npm run check

      - name: Unit tests
        run: npm test

      - name: Static build
        run: npm run build

      - name: Verify built repair
        run: |
          test -f dist/src/phaserMigration2Runtime.js
          test -f dist/src/phaserMigration2VisualCatalog.js
          test -f dist/src/phaserMigration2ReferenceCompletion.js
          test -f dist/src/fit.js
          grep -q "syncPhoneUi(scene.state)" dist/src/phaserMigration2Runtime.js
          grep -q "syncCameraNavigationUi(scene.state)" dist/src/phaserMigration2Runtime.js
          grep -q "P2_MOBILE_GAMEPLAY_PARITY_REPAIR" dist/styles.css
          grep -q "hud-resource-strip" dist/index.html

      - name: Commit verified repair
        run: |
          git config user.name "Apartment God Gameplay Parity Bot"
          git config user.email "actions@users.noreply.github.com"
          git add src/phaserMigration2Runtime.js src/phaserMigration2VisualCatalog.js src/phaserMigration2ReferenceCompletion.js src/fit.js src/ui.js index.html styles.css tests/phaser-migration-2-mobile-gameplay-parity.test.js apartment-god-production/DEVELOPMENT_MATRIX_PATCH_2026-07-19_MOBILE_GAMEPLAY_PARITY_REPAIR.md apartment-god-production/ONGOING_DESIGN_LOG_APPEND_2026-07-19_MOBILE_GAMEPLAY_PARITY_REPAIR_COMMITTED.md
          git commit -m "Repair P2 mobile gameplay parity"
          git push origin HEAD:phaser-migration-2

# retrigger: workflow now existed before this push
