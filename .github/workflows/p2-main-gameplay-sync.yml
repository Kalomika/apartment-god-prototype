name: Audit Main Gameplay Drift Against P2

on:
  workflow_dispatch:
  push:
    branches:
      - phaser-migration-2
    paths:
      - '.github/workflows/p2-main-gameplay-sync.yml'
      - 'src/phaserMigration2Runtime.js'
      - 'src/phaserMigration2GameplayVisuals.js'
      - 'src/main.js'
      - 'index.html'
      - 'tests/phaser-migration-2-main-gameplay-parity.test.js'

permissions:
  contents: read

jobs:
  audit-and-verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout Phaser Migration 2
        uses: actions/checkout@v4
        with:
          ref: phaser-migration-2
          fetch-depth: 0
          persist-credentials: false

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Fetch current main gameplay source
        run: git fetch origin main

      - name: Report main gameplay drift without modifying P2
        run: |
          files=(
            src/actions.js
            src/appMenu.js
            src/arcadeSystem.js
            src/autonomy.js
            src/basketballSystem.js
            src/calendarDisplay.js
            src/cameraNavigation.js
            src/careerSystem.js
            src/config.js
            src/fit.js
            src/frontYardDriveway.js
            src/frontYardRoutingCorrection.js
            src/garageDoorAlignmentOverlay.js
            src/gateTraversalGuard.js
            src/mainFloorLayoutPolish.js
            src/offsiteOverlay.js
            src/panicRoomCorrection.js
            src/poolActivityCleanup.js
            src/poolActivitySystem.js
            src/runtimeObjectCorrections.js
            src/runtimeRegressionGuards.js
            src/state.js
            src/timeSystem.js
            src/travelLocations.js
            src/ui.js
            src/vehicleSystem.js
            tests/book-reading-floor-route.test.js
            tests/calendar-work-hud.test.js
            tests/front-yard-driveway.test.js
            tests/layer-vehicle-games-regression.test.js
            tests/main-floor-layout-polish.test.js
            tests/phaser-parity-cleanup.test.js
            tests/pool-shot-movement.test.js
          )

          drift=0
          for file in "${files[@]}"; do
            if ! git diff --quiet origin/main -- "$file"; then
              echo "::warning file=$file::P2 differs from current main. Review intentionally before copying or merging."
              git diff --stat origin/main -- "$file"
              drift=1
            fi
          done

          if [ "$drift" -eq 0 ]; then
            echo "No drift detected across designated gameplay source files."
          else
            echo "Gameplay drift exists. This workflow is intentionally read-only and will not overwrite P2."
          fi

      - name: Install dependencies
        run: npm install --no-package-lock

      - name: Repository checks
        run: npm run check

      - name: Unit tests
        run: npx vitest run

      - name: Static build
        run: npm run build

      - name: Verify native P2 output
        run: |
          test -f dist/vendor/phaser.esm.js
          grep -q "bootPhaserMigration2Game" dist/src/main.js
          grep -q "phaser-migration-2-native-full-main-gameplay" dist/src/phaserMigration2Runtime.js
          grep -q "updateArcadeSystem" dist/src/phaserMigration2Runtime.js
          grep -q "updateBasketballSystem" dist/src/phaserMigration2Runtime.js
          grep -q "updateFrontYardEnvironment" dist/src/phaserMigration2Runtime.js
          ! grep -q "drawPhaserEnvironment" dist/src/phaserMigration2Runtime.js
          ! grep -q "textures.addCanvas" dist/src/phaserMigration2Runtime.js

      - name: Confirm workflow did not modify the checkout
        run: git diff --exit-code
