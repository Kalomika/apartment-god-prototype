name: P2 Exact Previsual Parity Audit

on:
  push:
    branches:
      - phaser-migration-2
    paths:
      - '.github/workflows/p2-previsual-parity-audit.yml'

permissions:
  contents: write

jobs:
  audit-previsual-parity:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Checkout latest Phaser Migration 2
        uses: actions/checkout@v4
        with:
          ref: phaser-migration-2
          fetch-depth: 0
          persist-credentials: true

      - name: Verify protected scope, baseline, backup and rules
        run: |
          test "$GITHUB_REPOSITORY" = "Kalomika/apartment-god-prototype"
          test "$(git branch --show-current)" = "phaser-migration-2"
          git ls-remote --exit-code --heads origin backup/phaser-migration-2-before-full-previsual-parity-repair-2026-07-19
          git cat-file -e c8941bbe16e5725ad02eb20596ee5a07868303b8^{commit}
          test -f docs/APARTMENT_GOD_DEVELOPMENT_HANDBOOK.md
          test -f docs/APARTMENT_GOD_BACKUP_POLICY.md
          test -f docs/APARTMENT_GOD_NO_BROAD_IMPLEMENTATION_RULE.md
          test -f docs/APARTMENT_GOD_PNG_UPLOAD_FALLBACK.md
          test -f apartment-god-production/ONGOING_DESIGN_LOG.md
          test -f apartment-god-production/DEVELOPMENT_MATRIX.md
          git log -15 --oneline

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install project
        run: npm install --no-package-lock

      - name: Create detached previsual baseline worktree
        run: |
          rm -rf /tmp/apartment-god-p2-previsual
          git worktree add --detach /tmp/apartment-god-p2-previsual c8941bbe16e5725ad02eb20596ee5a07868303b8

      - name: Run exact previsual parity audit
        run: node scripts/audit-p2-previsual-parity.mjs /tmp/apartment-god-p2-previsual .

      - name: Verify parity contract and runtime corrections
        run: |
          test -f apartment-god-production/P2_PREVISUAL_PARITY_AUDIT_2026-07-19.json
          grep -q '"status": "PASS"' apartment-god-production/P2_PREVISUAL_PARITY_AUDIT_2026-07-19.json
          grep -q '"exactFloorData": true' apartment-god-production/P2_PREVISUAL_PARITY_AUDIT_2026-07-19.json
          grep -q '"exactObjectData": true' apartment-god-production/P2_PREVISUAL_PARITY_AUDIT_2026-07-19.json
          grep -q '"stateParity": true' apartment-god-production/P2_PREVISUAL_PARITY_AUDIT_2026-07-19.json
          grep -q "setBaseActorVisualVisible" src/phaserMigration2ReferenceCompletion.js
          grep -q "entity.sleepObjectId" src/phaserMigration2ReferenceCompletion.js
          grep -q "pm2ReferenceAssetMode = 'lazy-optional'" src/phaserMigration2ReferenceCompletion.js
          grep -q "MAX_ACTIVITY_TEXTURES = 18" src/phaserMigration2ReferenceCompletion.js
          grep -q "MAX_STATE_TEXTURES = 10" src/phaserMigration2ReferenceCompletion.js
          grep -q "this.runtimeFailed = true" src/phaserMigration2Runtime.js
          grep -q "if (this.runtimeFailed || !this.state) return" src/phaserMigration2Runtime.js
          grep -q "this.scene.pause()" src/phaserMigration2Runtime.js
          grep -q '"authoredArtApproval": false' assets/manifests/phaser-migration-2-reference-visual-completion.json
          ! grep -q "drawPhaserEnvironment" src/phaserMigration2Runtime.js
          ! grep -q "textures.addCanvas" src/phaserMigration2Runtime.js

      - name: Repository checks
        run: npm run check

      - name: Unit tests
        run: npm test

      - name: Static build
        run: npm run build

      - name: Commit machine-readable parity audit
        run: |
          git config user.name "Apartment God Parity Audit Bot"
          git config user.email "actions@users.noreply.github.com"
          git add apartment-god-production/P2_PREVISUAL_PARITY_AUDIT_2026-07-19.json
          git commit -m "Verify exact P2 previsual gameplay parity"
          git pull --rebase origin phaser-migration-2
          git push origin HEAD:phaser-migration-2
