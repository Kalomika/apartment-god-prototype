name: P2 AppDeploy Portability

on:
  push:
    branches:
      - phaser-migration-2
    paths:
      - '.github/workflows/p2-appdeploy-portability.yml'

permissions:
  contents: write

jobs:
  patch-test-build:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout Phaser Migration 2
        uses: actions/checkout@v4
        with:
          ref: phaser-migration-2
          fetch-depth: 0
          persist-credentials: true

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Add static host Phaser fallback
        run: |
          node --input-type=module <<'NODE'
          import fs from 'node:fs';
          const runtimePath = 'src/phaserMigration2Runtime.js';
          let runtime = fs.readFileSync(runtimePath, 'utf8');
          const before = "const phaserModule = await import('../vendor/phaser.esm.js');";
          const after = "const phaserModule = await import('../vendor/phaser.esm.js').catch(() => import('https://cdn.jsdelivr.net/npm/phaser@3.90.0/dist/phaser.esm.js'));";
          if (!runtime.includes(before)) throw new Error('Expected portable local Phaser import was not found. Review manually.');
          runtime = runtime.replace(before, after);
          fs.writeFileSync(runtimePath, runtime);

          const testPath = 'tests/phaser-migration-2-main-gameplay-parity.test.js';
          let test = fs.readFileSync(testPath, 'utf8');
          const anchor = "    expect(runtimeSource).not.toContain(\"import('/vendor/phaser.esm.js')\");\n";
          const addition = "    expect(runtimeSource).toContain('cdn.jsdelivr.net/npm/phaser@3.90.0/dist/phaser.esm.js');\n";
          if (!test.includes(anchor)) throw new Error('P2 portability test anchor changed. Review manually.');
          test = test.replace(anchor, anchor + addition);
          fs.writeFileSync(testPath, test);
          NODE

      - name: Install dependencies
        run: npm install --no-package-lock

      - name: Repository checks
        run: npm run check

      - name: Unit tests
        run: npm test

      - name: Static build
        run: npm run build

      - name: Verify portable built runtime
        run: |
          test -f dist/vendor/phaser.esm.js
          grep -q "../vendor/phaser.esm.js" dist/src/phaserMigration2Runtime.js
          grep -q "cdn.jsdelivr.net/npm/phaser@3.90.0/dist/phaser.esm.js" dist/src/phaserMigration2Runtime.js
          ! grep -q "import('/vendor/phaser.esm.js')" dist/src/phaserMigration2Runtime.js

      - name: Commit verified portability fallback
        run: |
          git config user.name "Apartment God Portability Bot"
          git config user.email "actions@users.noreply.github.com"
          git add src/phaserMigration2Runtime.js tests/phaser-migration-2-main-gameplay-parity.test.js
          git commit -m "Add Phaser CDN fallback for P2 previews"
          git push origin HEAD:phaser-migration-2
