name: Phaser Parity CI

on:
  push:
    branches:
      - phaser-migration
  pull_request:
    branches:
      - main
      - phaser-migration

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Install dependencies
        run: npm install
      - name: Repository checks
        run: npm run check
      - name: Unit tests
        id: tests
        continue-on-error: true
        run: npx vitest run --reporter=json --outputFile=vitest-results.json
      - name: Upload unit test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vitest-results
          path: vitest-results.json
          if-no-files-found: error
      - name: Static build
        id: build
        continue-on-error: true
        run: npm run build
      - name: Verify Phaser vendor output
        id: vendor
        continue-on-error: true
        run: test -f dist/vendor/phaser.esm.js
      - name: Verify Phaser entry point
        id: entry
        continue-on-error: true
        run: grep -q "bootPhaserParityGame" dist/src/main.js
      - name: Enforce successful tests and build
        if: always()
        run: |
          test "${{ steps.tests.outcome }}" = "success"
          test "${{ steps.build.outcome }}" = "success"
          test "${{ steps.vendor.outcome }}" = "success"
          test "${{ steps.entry.outcome }}" = "success"
