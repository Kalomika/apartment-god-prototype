<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Cache-Control" content="no-store" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>Apartment God Prototype</title>
    <link rel="stylesheet" href="./styles.css?v=20260714-dog-cache-fix" />
  </head>
  <body>
    <main id="app-shell">
      <section id="game-wrap">
        <canvas id="game" width="1280" height="720" aria-label="Apartment God playable prototype"></canvas>
        <div id="interaction-menu" class="hidden"></div>
      </section>
      <section id="game-control-bar" aria-label="Game controls"></section>
      <aside id="hud">
        <h1>Apartment God</h1>
        <p class="tagline">Tap a person, then tap an object. Assign chores, solve needs, and keep the apartment alive.</p>

        <section class="panel">
          <h2>Selected</h2>
          <div id="selected-name">Resident</div>
          <div id="current-action">Idle</div>
        </section>

        <section class="panel">
          <h2>Needs</h2>
          <div id="needs"></div>
        </section>

        <section class="panel compact-grid">
          <button id="floor-0">Main</button>
          <button id="floor-1">Upstairs</button>
          <button id="floor-2">Basement</button>
          <button id="floor-3">Garage</button>
          <button id="floor-4">Backyard</button>
          <button id="speed-1">1x</button>
          <button id="speed-3">3x</button>
          <button id="pause">Pause</button>
          <button id="reset">Reset</button>
        </section>

        <section class="panel compact-grid" id="command-panel"></section>

        <section class="panel">
          <h2>World</h2>
          <div id="world-state"></div>
        </section>

        <section class="panel">
          <h2>Notifications</h2>
          <ol id="log"></ol>
        </section>
      </aside>
    </main>
    <script type="module" src="./src/main.js?v=20260714-human-renderer-framework"></script>
  </body>
</html>
