<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Cache-Control" content="no-store" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>Apartment God Prototype | Phaser Migration 2</title>
    <link rel="stylesheet" href="./styles.css?v=20260721-p2-hud-sidewalk" />
    <style>
      #game{background:#708078}
      #hud-status-strip{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:8px;align-items:center;margin:0 0 12px}
      #hud-calendar-pill,#hud-money-pill{min-width:0;padding:8px 11px;border-radius:12px;border:1px solid rgba(241,198,106,.42);background:rgba(8,11,17,.58);color:#f7f1dc;font-weight:1000;font-size:12px;line-height:1.15;letter-spacing:.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
      #hud-money-pill{color:#f1c66a;text-align:right}
      @media(max-width:760px){#hud-status-strip{grid-template-columns:1fr;margin-bottom:10px}#hud-calendar-pill,#hud-money-pill{padding:7px 9px;font-size:12px}#hud-money-pill{text-align:left}}
    </style>
  </head>
  <body>
    <main id="app-shell">
      <section id="game-wrap">
        <canvas id="game" width="960" height="720" aria-label="Apartment God Phaser Migration 2 native playable prototype"></canvas>
        <div id="interaction-menu" class="hidden"></div>
      </section>
      <section id="game-control-bar" aria-label="Game controls"></section>
      <aside id="hud">
        <h1>Apartment God</h1>
        <p class="tagline">Phaser Migration 2: native Phaser scene with synchronized current gameplay.</p>
        <div id="hud-status-strip" aria-live="polite">
          <div id="hud-calendar-pill">Y1 | Mon Jan 1 | 6:45 AM</div>
          <div id="hud-money-pill">$640</div>
        </div>

        <section class="panel">
          <h2>Selected</h2>
          <div id="selected-name">Resident</div>
          <div id="current-action">Idle</div>
        </section>

        <section class="panel">
          <h2>Needs</h2>
          <div id="needs"></div>
        </section>

        <section class="panel compact-grid">
          <button id="floor-0">Main</button>
          <button id="floor-1">Upstairs</button>
          <button id="floor-2">Basement</button>
          <button id="floor-3">Garage</button>
          <button id="floor-4">Backyard</button>
          <button id="floor-6">Front South</button>
          <button id="floor-7">Driveway</button>
          <button id="speed-1">1x</button>
          <button id="speed-3">3x</button>
          <button id="pause">Pause</button>
          <button id="reset">Reset</button>
        </section>

        <section class="panel compact-grid" id="command-panel"></section>

        <section class="panel">
          <h2>World</h2>
          <div id="world-state"></div>
        </section>

        <section class="panel">
          <h2>Notifications</h2>
          <ol id="log"></ol>
        </section>
      </aside>
    </main>
    <script type="module" src="./src/main.js?v=20260724-p2-character-unfreeze"></script>
  </body>
</html>
