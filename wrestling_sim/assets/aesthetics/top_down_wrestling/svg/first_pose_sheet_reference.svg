  <text x="600" y="36" class="label">GRAPPLE GODS, FIRST TOP DOWN WRESTLER POSE SET</text>
  <text x="75" y="92" class="label">REX</text>
  <text x="75" y="382" class="label">DANTE</text>

  <g transform="translate(165 160)"><text y="-115" class="small">IDLE</text><use href="#idle"/></g>
  <g transform="translate(325 160)"><text y="-115" class="small">WALK</text><use href="#walk"/></g>
  <g transform="translate(485 160)"><text y="-115" class="small">RUN</text><use href="#run"/></g>
  <g transform="translate(645 160)"><text y="-115" class="small">CROUCH</text><use href="#crouch"/></g>
