  <g transform="translate(965 145) scale(.8)"><text y="-125" class="small">SUPINE</text><use href="#supine"/></g>
  <g transform="translate(1110 165) scale(.82)"><text y="-120" class="small">SEATED</text><use href="#seated"/></g>

  <g transform="translate(165 450)"><style>.hairSlot{fill:#1b1410}.gearSlot{fill:#17191f}.bootSlot{fill:#101217}</style><text y="-115" class="small">IDLE</text><use href="#idle"/></g>
  <g transform="translate(325 450)"><style>.hairSlot{fill:#1b1410}.gearSlot{fill:#17191f}.bootSlot{fill:#101217}</style><text y="-115" class="small">WALK</text><use href="#walk"/></g>
