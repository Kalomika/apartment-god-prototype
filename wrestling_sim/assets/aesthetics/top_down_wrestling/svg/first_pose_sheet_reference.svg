      .detail{stroke:#071018;stroke-width:1.4;stroke-linecap:round;stroke-linejoin:round;fill:none}
      .rexHair{fill:#d8b449}.rexGear{fill:#f4f4f4}.danteHair{fill:#1b1410}.danteGear{fill:#17191f}.skin{fill:#f8efe3}.boot{fill:#f4f4f4}.darkBoot{fill:#101217}
    </style>
    <g id="idle">
