  <g transform="translate(645 450)"><style>.hairSlot{fill:#1b1410}.gearSlot{fill:#17191f}.bootSlot{fill:#101217}</style><text y="-115" class="small">CROUCH</text><use href="#crouch"/></g>
  <g transform="translate(805 450)"><style>.hairSlot{fill:#1b1410}.gearSlot{fill:#17191f}.bootSlot{fill:#101217}</style><text y="-115" class="small">GRAPPLE</text><use href="#grapple"/></g>
  <g transform="translate(965 435) scale(.8)"><style>.hairSlot{fill:#1b1410}.gearSlot{fill:#17191f}.bootSlot{fill:#101217}</style><text y="-125" class="small">SUPINE</text><use href="#supine"/></g>
  <g transform="translate(1110 455) scale(.82)"><style>.hairSlot{fill:#1b1410}.gearSlot{fill:#17191f}.bootSlot{fill:#101217}</style><text y="-120" class="small">SEATED</text><use href="#seated"/></g>
