<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 640" role="img" aria-labelledby="title desc">
  <title id="title">Grapple Gods first top down pose sheet reference</title>
  <desc id="desc">Editable vector pose sheet showing the first readable top down wrestler poses for Rex and Dante.</desc>
  <defs>
